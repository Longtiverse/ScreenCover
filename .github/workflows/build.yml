name: Build ScreenCover

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.28.x'
        
    - name: Configure CMake
      run: cmake -B build -S . -A x64
      
    - name: Build Release
      run: cmake --build build --config Release --parallel
      
    - name: Package files
      shell: cmd
      run: |
        mkdir dist
        copy build\bin\Release\ScreenCover.exe dist\
        copy README.md dist\
        (
          echo [General]
          echo DefaultMode=overlay
          echo RememberLastMode=true
          echo.
          echo [Hotkeys]
          echo TriggerKey=6
          echo.
          echo [ModePowerOff]
          echo WatchdogInterval=500
          echo AutoRepowerOff=true
          echo MaxWakeDuration=1000
        ) > dist\ScreenCover.ini
        powershell Compress-Archive -Path "dist\*" -DestinationPath "ScreenCover-v2.0.0-Windows-x64.zip"
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenCover-Windows-x64
        path: build/bin/Release/ScreenCover.exe
        retention-days: 30
        
    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: ScreenCover-v2.0.0-Release
        path: ScreenCover-v2.0.0-Windows-x64.zip
        retention-days: 90

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: ScreenCover-v2.0.0-Release
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ScreenCover-v2.0.0-Windows-x64.zip
        name: ScreenCover v2.0.0
        body: |
          ## ScreenCover v2.0.0
          
          ### Features
          - Dual mode: Software overlay (smile dog) + Hardware power off (neutral dog)
          - Hotkey: Ctrl + 666
          - System tray icon switch
          - Watchdog protection for hardware mode
          - Multi-monitor support
          
          ### Usage
          1. Extract ZIP file
          2. Run ScreenCover.exe
          3. Press Ctrl+666 to trigger blackout
          4. Right-click tray icon to switch modes
          
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
